name: CD - Despliegue a Producción (Simulado)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Construir JAR de producción
        run: |
          cd proyectoFinal1
          mvn clean package -DskipTests

      - name: Simular despliegue
        run: |
          echo "Despliegue simulado del sistema de ventas MaxFit."
          echo "En un entorno real, aquí se publicaría el JAR en un servidor."
