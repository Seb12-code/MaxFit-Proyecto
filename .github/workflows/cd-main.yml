name: CD - Despliegue a Producción (Simulado)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: proyectoFinal1

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución al wrapper de Maven
        run: chmod +x mvnw

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Construir JAR de producción
        run: ./mvnw -q clean package -DskipTests

      - name: Simular despliegue
        run: |
          echo "Despliegue simulado del sistema de ventas MaxFit."
          echo "Jar generado en la carpeta target:"
          ls target
