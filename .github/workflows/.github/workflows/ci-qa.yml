name: QA - Revisión de calidad (Manual)

on:
  workflow_dispatch:

jobs:
  qa-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar para QA
        run: |
          cd proyectoFinal1
          mvn clean package -DskipTests

      - name: Análisis de QA (simulado)
        run: |
          echo "Revisión QA simulada: verificación general del sistema MaxFit."
